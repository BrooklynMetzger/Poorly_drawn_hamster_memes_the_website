<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamster Picture Picker</title>
  <link rel="stylesheet" href="./dist/output.css">
  <link rel="stylesheet" href="./css/assets/socialsIcon.css">
</head>

<body class="bg-grid-base bg-grid-pattern min-h-screen p-8 font-array">
  <div class="star-container fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
    <div id="stars"></div>
  </div>

  <main class="max-w-4xl mx-auto flex flex-col items-center text-center">
    <section class="layout w-full">
      <div class="header">
        <nav class="w-fit mx-auto bg-peach p-4 mb-8 rounded-xl shadow-sm flex justify-center gap-8 font-comico text-xl text-purple">
          <a href="./index.html" class="text-color-peach hover:underline decoration-2 underline-offset-4">🐹 Home</a>
          <a href="./gallery.html" class="hover:text-color-peach hover:underline transition-colors">📖 Gallery</a>
        </nav>
      </div>
      <div class="body">
        <div class="flex flex-col md:flex-row items-center justify-center gap-12 w-full mt-8">
        <div class="stack justify-center">
          <div class="card">
            <div id="hamster-frame" class="image">
              <span class="text">You have not clicked the button yet!</span>
            </div>
            <span class="title">Beautiful Hamster Above</span>
          </div>
        </div>
        <div class="flex flex-col items-center justify-center gap-4 w-full md:w-auto">
          <button class="button font-comico" id="hs-run-on-click-run-confetti">Click Me For Hamster!</button>
          <button class="button font-comico" id="second-button">Download Image</button>
        </div>
      </div>
    </section>

      <div class="footer mt-8 text-center">
        <h1 class="text-4xl md:text-5xl font-comico text-background mb-2 drop-shadow-sm">
          Get a Random Hamster Meme
        </h1>
        <div id="socials-container" class="mt-8 flex justify-center w-full md:absolute md:top-4 md:right-8 md:mt-0 md:w-auto md:scale-75 md:origin-top-right z-50"></div>
      </div>
    </section>

  </main>

  <script src ="./scripts/downloadImage.js"> </script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="./scripts/randomHamster.js"></script>
  <script src="./scripts/getSocials.js"></script>
</body>
</html>
